<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Zubair Khan favicon</title>
  <desc id="desc">A ZK monogram for Zubair Khan.</desc>
  <defs>
    <linearGradient id="bg" x1="8" x2="56" y1="6" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="stroke" x1="12" x2="54" y1="14" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8"/>
      <stop offset="0.45" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.388 0 0 0 0 0.4 0 0 0 0 0.945 0 0 0 .7 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="5" y="5" width="54" height="54" rx="12" fill="none" stroke="url(#stroke)" stroke-width="2.5" opacity="0.85"/>
  <path fill="#1E293B" opacity="0.55" d="M13 51h38v3H13z"/>
  <g fill="none" stroke="url(#stroke)" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path stroke-width="7" d="M14 18h22L16 46h23"/>
    <path stroke-width="6.5" d="M43 18v28"/>
    <path stroke-width="6.5" d="M44 32 53 18"/>
    <path stroke-width="6.5" d="M44 32 54 46"/>
  </g>
  <circle cx="50" cy="14" r="3" fill="#22D3EE"/>
</svg>
