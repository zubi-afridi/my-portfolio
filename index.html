  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Zubair Khan is a frontend website developer building clean, responsive, and performance-focused React, Next.js, and Tailwind CSS web experiences."

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0d182e" />
    <meta property="og:type" content="website" />

      property="og:description"
      content="Frontend website developer focused on clean, responsive, and performance-focused web experiences."

    <meta
      name="twitter:description"
      content="Frontend website developer focused on clean, responsive, and performance-focused web experiences."
    />
    <script>
      (function () {
        try {
          var savedTheme = window.localStorage.getItem("theme");

          if (savedTheme === "light") {
            document.documentElement.classList.remove("dark");
            return;
          }

          document.documentElement.classList.add("dark");
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <title>Zubair Khan | Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
